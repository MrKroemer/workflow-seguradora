<!DOCTYPE html>

<html class="light" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cadastro de Propostas - Insurance Management</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen flex-col overflow-hidden max-w-md mx-auto bg-white dark:bg-background-dark shadow-xl">
<!-- Header -->
<header class="flex items-center justify-between px-4 py-4 border-b border-primary/10 bg-white dark:bg-background-dark sticky top-0 z-10">
<div class="flex items-center gap-3">
<button class="flex items-center justify-center p-2 rounded-lg hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-300">menu</span>
</button>
<h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-slate-100">Nova Proposta</h1>
</div>
<button class="flex items-center justify-center p-2 rounded-lg hover:bg-primary/10">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-300">notifications</span>
</button>
</header>
<!-- Main Content (Scrollable) -->
<main class="flex-1 overflow-y-auto pb-24">
<!-- Step Indicator -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-6 bg-slate-50 dark:bg-primary/5">
<div class="h-2.5 w-8 rounded-full bg-primary"></div>
<div class="h-2.5 w-2.5 rounded-full bg-primary/30"></div>
<div class="h-2.5 w-2.5 rounded-full bg-primary/30"></div>
</div>
<form class="space-y-8 px-4 py-4">
<!-- Section 1: Dados do Segurado -->
<section class="space-y-4">
<div class="flex items-center gap-2 border-l-4 border-primary pl-3">
<h2 class="text-lg font-bold text-slate-800 dark:text-slate-200">Dados do Segurado</h2>
</div>
<div class="grid gap-4">
<label class="flex flex-col gap-1.5">
<span class="text-sm font-semibold text-slate-600 dark:text-slate-400">Nome Completo</span>
<input class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 p-4 text-base focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-slate-400" placeholder="Ex: João da Silva" type="text"/>
</label>
<label class="flex flex-col gap-1.5">
<span class="text-sm font-semibold text-slate-600 dark:text-slate-400">CPF / CNPJ</span>
<input class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 p-4 text-base focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-slate-400" placeholder="000.000.000-00" type="text"/>
</label>
<label class="flex flex-col gap-1.5">
<span class="text-sm font-semibold text-slate-600 dark:text-slate-400">E-mail</span>
<input class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 p-4 text-base focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-slate-400" placeholder="cliente@email.com" type="email"/>
</label>
</div>
</section>
<!-- Section 2: Detalhes da Apólice -->
<section class="space-y-4">
<div class="flex items-center gap-2 border-l-4 border-primary pl-3">
<h2 class="text-lg font-bold text-slate-800 dark:text-slate-200">Detalhes da Apólice</h2>
</div>
<div class="grid gap-4">
<label class="flex flex-col gap-1.5">
<span class="text-sm font-semibold text-slate-600 dark:text-slate-400">Seguradora</span>
<select class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 p-4 text-base focus:border-primary focus:ring-1 focus:ring-primary outline-none appearance-none transition-all">
<option disabled="" selected="" value="">Selecione a seguradora</option>
<option>Porto Seguro</option>
<option>Allianz</option>
<option>Bradesco Seguros</option>
<option>Liberty Seguros</option>
</select>
</label>
<label class="flex flex-col gap-1.5">
<span class="text-sm font-semibold text-slate-600 dark:text-slate-400">Ramo / Produto</span>
<select class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 p-4 text-base focus:border-primary focus:ring-1 focus:ring-primary outline-none appearance-none transition-all">
<option disabled="" selected="" value="">Selecione o ramo</option>
<option>Automóvel</option>
<option>Residencial</option>
<option>Vida</option>
<option>Empresarial</option>
</select>
</label>
<label class="flex flex-col gap-1.5">
<span class="text-sm font-semibold text-slate-600 dark:text-slate-400">Número da Proposta</span>
<input class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 p-4 text-base focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-slate-400" placeholder="Ex: 123456789" type="text"/>
</label>
</div>
</section>
<!-- Section 3: Valores e Vigência -->
<section class="space-y-4">
<div class="flex items-center gap-2 border-l-4 border-primary pl-3">
<h2 class="text-lg font-bold text-slate-800 dark:text-slate-200">Valores e Vigência</h2>
</div>
<div class="grid grid-cols-2 gap-4">
<label class="flex flex-col gap-1.5">
<span class="text-sm font-semibold text-slate-600 dark:text-slate-400">Prêmio Líquido</span>
<input class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 p-4 text-base focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-slate-400" placeholder="R$ 0,00" type="text"/>
</label>
<label class="flex flex-col gap-1.5">
<span class="text-sm font-semibold text-slate-600 dark:text-slate-400">Comissão %</span>
<input class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 p-4 text-base focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-slate-400" placeholder="15%" type="number"/>
</label>
<label class="flex flex-col gap-1.5">
<span class="text-sm font-semibold text-slate-600 dark:text-slate-400">Data de Início</span>
<input class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 p-4 text-base focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" type="date"/>
</label>
<label class="flex flex-col gap-1.5">
<span class="text-sm font-semibold text-slate-600 dark:text-slate-400">Data de Fim</span>
<input class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 p-4 text-base focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" type="date"/>
</label>
</div>
</section>
</form>
</main>
<!-- Footer Button -->
<footer class="absolute bottom-16 left-0 right-0 p-4 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light/95 dark:via-background-dark/95 to-transparent">
<button class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                Salvar Proposta
            </button>
</footer>
<!-- Bottom Navigation Bar -->
<nav class="absolute bottom-0 left-0 right-0 flex gap-2 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 pb-3 pt-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-medium leading-normal tracking-wide">Início</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">description</span>
<p class="text-[10px] font-medium leading-normal tracking-wide">Propostas</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">group</span>
<p class="text-[10px] font-medium leading-normal tracking-wide">Clientes</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">person</span>
<p class="text-[10px] font-medium leading-normal tracking-wide">Perfil</p>
</a>
</nav>
</div>
</body></html>
